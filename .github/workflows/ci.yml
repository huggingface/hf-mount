name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-test:
    name: Lint & Unit Tests
    runs-on:
      group: hf-mount-ci
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev

      - name: Format check
        run: cargo +nightly fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test --lib

  smoke-test:
    name: Smoke Tests (FUSE + NFS)
    runs-on:
      group: hf-mount-ci
    needs: lint-test
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN_HUB_CI }}
      HF_ENDPOINT: https://hub-ci.huggingface.co
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev nfs-common
          echo 'user_allow_other' | sudo tee -a /etc/fuse.conf

      - name: Build release binaries
        run: cargo build --release

      - name: Integration tests (buckets)
        run: cargo test --release --test fuse_ops --test nfs_ops -- --test-threads=1 --nocapture

      - name: Integration tests (repo mount)
        env:
          HF_ENDPOINT: https://huggingface.co
        run: unset HF_TOKEN && cargo test --release --test repo_ops -- --test-threads=1 --nocapture

  pjdfstest:
    name: POSIX Compliance (pjdfstest)
    runs-on:
      group: hf-mount-ci
    needs: lint-test
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN_HUB_CI }}
      HF_ENDPOINT: https://hub-ci.huggingface.co
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev autoconf automake gcc make perl

      - name: Build hf-mount
        run: cargo build --release

      - name: Build pjdfstest
        run: |
          git clone --depth 1 https://github.com/pjd/pjdfstest.git /tmp/pjdfstest
          cd /tmp/pjdfstest
          autoreconf -ifs
          ./configure
          make pjdfstest

      - name: Create bucket and mount
        run: |
          # Resolve username for bucket namespace
          USERNAME=$(curl -sf "${HF_ENDPOINT}/api/whoami-v2" \
            -H "Authorization: Bearer ${HF_TOKEN}" | jq -r '.name')
          BUCKET_ID="${USERNAME}/pjdfstest-$(date +%s)"
          echo "BUCKET_ID=$BUCKET_ID" >> "$GITHUB_ENV"

          # Create ephemeral bucket (ignore 409 = already exists)
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            "${HF_ENDPOINT}/api/buckets/${BUCKET_ID}" \
            -H "Authorization: Bearer ${HF_TOKEN}" \
            -H "Content-Type: application/json" -d '{}')
          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 409 ]; then
            echo "Bucket creation failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Bucket $BUCKET_ID ready (HTTP $HTTP_CODE)"

          # Mount it
          echo 'user_allow_other' | sudo tee -a /etc/fuse.conf
          MOUNT_POINT="/tmp/pjdfs-mount"
          mkdir -p "$MOUNT_POINT"
          echo "MOUNT_POINT=$MOUNT_POINT" >> "$GITHUB_ENV"

          sudo -E ./target/release/hf-mount-fuse \
            --poll-interval-secs 0 --advanced-writes \
            bucket "$BUCKET_ID" "$MOUNT_POINT" &
          echo "MOUNT_PID=$!" >> "$GITHUB_ENV"

          # Wait for mount
          for i in $(seq 1 30); do
            if mountpoint -q "$MOUNT_POINT" 2>/dev/null; then
              echo "Mounted at $MOUNT_POINT"
              break
            fi
            sleep 1
          done
          mountpoint -q "$MOUNT_POINT" || (echo "Mount failed"; cat /tmp/hf-mount-cache/*.log 2>/dev/null; exit 1)

      - name: Run pjdfstest
        run: |
          cd "$MOUNT_POINT"
          # Run tests, capture output (don't fail the job yet)
          sudo prove -r /tmp/pjdfstest/tests/ 2>&1 | tee /tmp/pjdfstest-results.txt || true

      - name: Parse and report results
        if: always()
        run: |
          # Extract summary line: "Files=N, Tests=N, ..."
          SUMMARY=$(grep '^Files=' /tmp/pjdfstest-results.txt || echo "No summary found")
          echo "## pjdfstest summary"
          echo "$SUMMARY"

          # Count passed/failed per category
          echo ""
          echo "### Per-category results"
          for dir in /tmp/pjdfstest/tests/*/; do
            cat=$(basename "$dir")
            line=$(grep "^/tmp/pjdfstest/tests/${cat}/" /tmp/pjdfstest-results.txt | grep -c "ok$" || true)
            total=$(grep -c "^/tmp/pjdfstest/tests/${cat}/" /tmp/pjdfstest-results.txt || true)
            echo "${cat}: ${line}/${total} files passed"
          done

      - name: Post results on PR
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(grep '^Files=' /tmp/pjdfstest-results.txt || echo "No summary found")
          FAILURES=$(grep -A1 'Test Summary Report' /tmp/pjdfstest-results.txt | head -1 || true)

          # Build per-category table
          TABLE="| Category | Files | Passed | Failed |\n|----------|-------|--------|--------|\n"
          for dir in /tmp/pjdfstest/tests/*/; do
            cat=$(basename "$dir")
            total=$(grep -c "^/tmp/pjdfstest/tests/${cat}/" /tmp/pjdfstest-results.txt 2>/dev/null || echo 0)
            passed=$(grep "^/tmp/pjdfstest/tests/${cat}/" /tmp/pjdfstest-results.txt 2>/dev/null | grep -c "ok$" || echo 0)
            failed=$((total - passed))
            TABLE="${TABLE}| ${cat} | ${total} | ${passed} | ${failed} |\n"
          done

          PR="${{ github.event.pull_request.number }}"
          MARKER="<!-- pjdfstest-results -->"
          BODY="${MARKER}
          ## POSIX Compliance (pjdfstest)

          \`\`\`
          ${SUMMARY}
          \`\`\`

          $(echo -e "$TABLE")
          "

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$BODY"
          else
            gh pr comment "$PR" --body "$BODY"
          fi

      - name: Cleanup
        if: always()
        run: |
          # Unmount
          sudo umount -l "$MOUNT_POINT" 2>/dev/null || true
          kill "$MOUNT_PID" 2>/dev/null || true

          # Delete bucket
          curl -sf -X DELETE "${HF_ENDPOINT}/api/buckets/${BUCKET_ID}" \
            -H "Authorization: Bearer ${HF_TOKEN}" || true

  bench:
    name: Benchmarks
    runs-on:
      group: hf-mount-ci
    needs: lint-test
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN_HUB_CI }}
      HF_ENDPOINT: https://hub-ci.huggingface.co
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev nfs-common
          echo 'user_allow_other' | sudo tee -a /etc/fuse.conf

      - name: Build release binaries
        run: cargo build --release

      - name: Install fio
        run: sudo apt-get install -y fio

      - name: Run benchmarks
        timeout-minutes: 10
        run: cargo test --release --test bench --test fio_bench -- --nocapture 2>&1 | tee bench_output.txt

      - name: Post benchmark results
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Strip ANSI codes, then extract only ==== delimited blocks
          CLEAN=$(sed 's/\x1b\[[0-9;]*m//g' bench_output.txt)
          TABLES=$(echo "$CLEAN" | awk '
            /^=====*$/ { inside=!inside; print; next }
            inside { print }
          ')
          if [ -z "$TABLES" ]; then
            echo "No benchmark table found in output"
            exit 0
          fi

          PR="${{ github.event.pull_request.number }}"
          MARKER="<!-- bench-results -->"
          BODY="${MARKER}
          ## Benchmark Results

          \`\`\`
          ${TABLES}
          \`\`\`"

          # Find existing comment with our marker
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$BODY"
            echo "Updated existing comment $COMMENT_ID"
          else
            gh pr comment "$PR" --body "$BODY"
            echo "Created new comment"
          fi
