name: Docker (ad-hoc)

# Build & push a multi-arch docker image off any branch, tagged with the
# commit sha (no release, no version bump, no GitHub release artifacts).
# Useful for testing image-level changes (Dockerfile, k8s manifests, etc.)
# without cutting a real release.
on:
  workflow_dispatch:
    inputs:
      heap_profiling:
        description: "Enable jemalloc heap profiling (canary build)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/_docker-build.yml
    with:
      tag_base: ${{ inputs.heap_profiling && format('sha-{0}-heap-prof', github.sha) || format('sha-{0}', github.sha) }}
      push_latest: false
      cargo_features: ${{ inputs.heap_profiling && 'fuse,vendored-openssl,heap-profiling' || 'fuse,vendored-openssl' }}
