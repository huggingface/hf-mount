[package]
name = "hf-mount"
version = "0.1.0"
edition = "2024"

[dependencies]
# xet-core crates
data = { git = "https://github.com/huggingface/xet-core.git", rev = "4af99f4" }
mdb_shard = { git = "https://github.com/huggingface/xet-core.git", rev = "4af99f4" }
utils = { git = "https://github.com/huggingface/xet-core.git", rev = "4af99f4" }
hub_client = { git = "https://github.com/huggingface/xet-core.git", rev = "4af99f4" }
xet_runtime = { git = "https://github.com/huggingface/xet-core.git", rev = "4af99f4" }
cas_client = { git = "https://github.com/huggingface/xet-core.git", rev = "4af99f4" }
cas_types = { git = "https://github.com/huggingface/xet-core.git", rev = "4af99f4" }
cas_object = { git = "https://github.com/huggingface/xet-core.git", rev = "4af99f4" }
merklehash = { git = "https://github.com/huggingface/xet-core.git", rev = "4af99f4" }

# External crates
fuser = { version = "0.17", features = ["macos-no-mount"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
reqwest = { version = "0.12", features = ["json"] }
clap = { version = "4", features = ["derive", "env"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libc = "0.2"
async-trait = "0.1"
bytes = "1"
chrono = "0.4"
uuid = { version = "1", features = ["v4"] }
nfsserve = { version = "0.10", optional = true }

[features]
nfs = ["dep:nfsserve"]
