[package]
name = "hf-mount"
version = "0.1.0"
edition = "2024"

[dependencies]
# xet-core crates (local path for dev, switch to git dep for release)
data = { path = "../../xet-core/data" }
mdb_shard = { path = "../../xet-core/mdb_shard" }
utils = { path = "../../xet-core/utils" }
hub_client = { path = "../../xet-core/hub_client" }
xet_runtime = { path = "../../xet-core/xet_runtime" }

cas_client = { path = "../../xet-core/cas_client" }
cas_types = { path = "../../xet-core/cas_types" }
cas_object = { path = "../../xet-core/cas_object" }
merklehash = { path = "../../xet-core/merklehash" }

# External crates
fuser = { version = "0.17", features = ["macos-no-mount"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
reqwest = { version = "0.12", features = ["json"] }
clap = { version = "4", features = ["derive", "env"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libc = "0.2"
async-trait = "0.1"
bytes = "1"
chrono = "0.4"
