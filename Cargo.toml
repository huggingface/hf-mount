[package]
name = "hf-mount"
version = "0.1.0"
edition = "2024"

[dependencies]
# xet-core crates
xet-client = { git = "https://github.com/huggingface/xet-core.git", branch = "adrien/combined-hf-mount" }
xet-core-structures = { git = "https://github.com/huggingface/xet-core.git", branch = "adrien/combined-hf-mount" }
xet-data = { git = "https://github.com/huggingface/xet-core.git", branch = "adrien/combined-hf-mount" }
xet-runtime = { git = "https://github.com/huggingface/xet-core.git", branch = "adrien/combined-hf-mount" }

# External crates
async-trait = "0.1"
bytes = "1"
chrono = "0.4"
clap = { version = "4", features = ["derive", "env"] }
fuser = { version = "0.17", features = ["macos-no-mount"] }
futures = "0.3"
libc = "0.2"
nfsserve = "0.10"
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
ulid = "1"
uuid = { version = "1", features = ["v4"] }

[[bin]]
name = "hf-mount-fuse"
path = "src/bin/hf-mount-fuse.rs"

[[bin]]
name = "hf-mount-nfs"
path = "src/bin/hf-mount-nfs.rs"

[[bin]]
name = "hf-mount-daemon"
path = "src/bin/hf-mount-daemon.rs"
